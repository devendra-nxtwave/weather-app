<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header__brand">Weather App</div>
      <nav class="header__nav" aria-label="Main navigation">
        <a href="#" class="nav-link nav-link--active">Dashboard</a>
        <a href="#" class="nav-link">Map</a>
        <a href="#" class="nav-link">Education</a>
        <a href="#" class="nav-link">Historical</a>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <!-- Sun icon (light mode) — swap via JS or CSS -->
        <svg class="icon icon-sun" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="icon icon-moon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </header>

    <!-- Main -->
    <main class="main">
      
      <!-- Search -->
      <section class="search-section">
        <div class="search-wrapper">
          <form class="search-form" id="searchForm">
            <input
              type="text"
              id="searchInput"
              class="search-input"
              placeholder="Search for a city or meteorological station..."
              autocomplete="off"
            />
            <button type="submit" id="searchBtn" class="search-btn">SEARCH</button>
          </form>
          <button
            type="button"
            id="clearCityBtn"
            class="clear-city-btn hidden"
            aria-label="Clear saved city"
            title="Clear city"
          >✕</button>
        </div>

        <div id="errorBanner" class="error-banner hidden" role="alert"></div>

        <div id="loadingSpinner" class="loading-spinner hidden" aria-live="polite">
          <div class="spinner"></div>
          <span>Loading weather data...</span>
        </div>
      </section>

      <!-- Current weather card -->
      <section class="card weather-card hidden" id="weatherCard">
        <div class="weather-card__main">
          <h2 class="weather-card__city" id="weatherCity">—</h2>
          <p class="weather-card__date" id="weatherDate">—</p>
          <p class="weather-card__temp" id="weatherTemp">
            <span id="weatherTempValue">—</span><span class="weather-card__unit" id="weatherUnit">°C</span>
          </p>
          <p class="weather-card__condition">
            <span class="weather-card__icon" id="weatherIcon" aria-hidden="true"></span>
            <span id="weatherCondition">—</span>
          </p>
        </div>
        <div class="weather-card__stats">
          <div class="stat">
            <span class="stat__label">Humidity</span>
            <span class="stat__value" id="weatherHumidity">—</span>
          </div>
          <div class="stat">
            <span class="stat__label">Wind Speed</span>
            <span class="stat__value" id="weatherWind">—</span>
          </div>
          <div class="stat">
            <span class="stat__label">Pressure</span>
            <span class="stat__value" id="weatherPressure">—</span>
          </div>
        </div>
      </section>

    <!-- 5-day forecast strip -->
    <section class="forecast-strip hidden" id="forecastStrip"></section>

    <!-- Hourly insights panel -->
    <section class="card insights-panel hidden" id="insightsPanel">
      <h3 class="insights-panel__title">Hourly Micro-Data Insights</h3>
      <ul class="insights-list" id="insightsList"></ul>
    </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer__brand">
        <strong>Weather App</strong>
        <p>© 2024 Weather App. Precision Weather Education.</p>
      </div>
      <div class="footer__links">
        <a href="#">Privacy Policy</a>
        <span>·</span>
        <a href="#">Terms of Service</a>
        <span>·</span>
        <a href="#">Scientific Data Sources</a>
      </div>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
